<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <title>create</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>

<body>
    <header>
        <div id="Logo">
            <img src="static\Icons\pickrLogo.svg">
        </div>
    </header>

    <main>
        <form action="/create" method="post">

            <div class="field">
                <p>Question:</p>
                <input type="text" name="frage" placeholder="Type question...">

            </div>

            <div class="answers">

                <div class="option">
                    <p>Option 1:</p>
                    <div class="option-row">
                        <input type="text" placeholder="Answer 1">
                        <button type="button">❌</button>
                    </div>
                </div>

                <div class="option">
                    <p>Option 2:</p>
                    <div class="option-row">
                        <input type="text" placeholder="Answer 2">
                        <button type="button">❌</button>
                    </div>
                </div>

            </div>

            <button type="button" onclick="addAnswer()">➕ add Answer</button>
            
            <button type="submit">Start poll</button>

        </form>

        <!--Ab hier bis Zeile 55 ists Buggy, check aber nicht wie man fixt. wenn zbs <a href="/">Back</a> schreibst, gehts wieder-->

        <div class="buttons">
            
            <div>

                <div class="buttons">
                    <a href="{{ url_for('index') }}">Back</a>
                </div>

    </main>

    <footer>
        <div class="footer-line">TH Augsburg · Studienprojekt · Webtechnologien / Agile Webanwendungen für Python</div>
        <div class="footer-line">Mario Winter · Alfred Rose · © 2026</div>
    </footer>

</body>
