<!DOCTYPE html>
<html lang="de">

	<head>
		<meta charset="UTF-8" />
		<title>choose</title>
		<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
		<script src="{{ url_for('static', filename='script.js') }}"></script>
	</head>

	<body>
		<header>
			<div id="Logo">
				<img src="{{ url_for('static', filename='Icons/pickrLogo.svg') }}">
			</div>
		</header>


		<main>

			<p>{{poll.question}}</p>

            <!--Wie bauen wir jetzt die möglichen antworten ein?-->

			
			<form method="post" action="/vote/{{ code }}">
    			{% for answer in poll.answers %}
       			 	<button type="submit" name="vote" value="{{ loop.index0 }}">
           		 	{{ answer }}
        			</button>
        			<br><br>
    			{% endfor %}
			</form>




			
			<div class="buttons">
				<a href="{{ url_for('index') }}">Back</a>
			</div>

		</main>


		<footer>
			<div class="footer-line">TH Augsburg · Studienprojekt · Webtechnologien / Agile Webanwendungen für Python</div>
			<div class="footer-line">Mario Winter · Alfred Rose · © 2026</div>
		</footer>
	</body>



</html>
