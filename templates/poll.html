<!DOCTYPE html>
<html lang="de">

    <head>
        <meta charset="UTF-8" />
        <title>Poll</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <script src="{{ url_for('static', filename='script.js') }}"></script>
    </head>

    <body>
        
    

        <h1>{{ poll.question }}</h1>

        <p>Code: {{ code }}</p>

        <form method="post" action="/vote/{{ code }}">
            {% for answer in poll.answers %}
                <button type="submit" name="vote" value="{{ loop.index0 }}">
                    {{ answer }}
                </button><br><br>
            {% endfor %}
        </form>

        <h2>Results:</h2>
        <ul>
            {% for i in range(poll.answers|length) %}
                <li>{{ poll.answers[i] }} - {{ poll.votes[i] }}</li>
            {% endfor %}
        </ul>

        <a href="/">Back</a>
    </body>
</html>
