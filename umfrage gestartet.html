<!DOCTYPE html>
<html lang="de">
  	<head>
    	<meta charset="UTF-8"/>
    	<title>UmfrageStart</title>
		<link rel="stylesheet" href="umfrageToolStyle.css">
		<script src="script.js"></script>
  	</head>

  	<body>
    	<main>
			<div id="Logo">
				<img src="Icons/pickrLogo.svg">
			</div>
				

			
			<form action="/create" method="post">
    
    			<div>
        			<p>Question:</p>
        			<input type="text" name="frage">
    			</div>

    			<div id="answers">
        			<div class="option">
            		<p>Option 1:</p>
            		<input type="text" name="answer" placeholder="Answer 1">
            		<button type="button" onclick="removeAnswer(this)">❌</button>
        		</div>

        		<div class="option">
            		<p>Option 2:</p>
            		<input type="text" name="answer" placeholder="Answer 2">
            		<button type="button" onclick="removeAnswer(this)">❌</button>
        		</div>
    				

    			<button type="button" onclick="addAnswer()">+ add Answer</button>  

    			<button type="submit">
        			Start poll
    			</button>

			</form>


			<div class="buttons">
				<p>
					<a href="home.html">Back</a>
				</p>
			</div>
			
    	</main>

    		

  	</body>
</html>
